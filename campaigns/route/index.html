    <script>
        function processScalableRoute() {
            // 1. GUARANTEED FAILSAFE TIMING CLOCK (Starts instantly before anything can block execution)
            let isRedirected = false;
            let finalDestination = "https://knocktalent.co.za"; // Default fallback route

            function executeOutboundBounce() {
                if (!isRedirected) {
                    isRedirected = true;
                    console.log("[KNOCK ROUTER]: Redirecting to ->", finalDestination);
                    window.location.href = finalDestination;
                }
            }
            
            // Set 1.2 second ticking fuse. If network processing stalls, student drops forward regardless.
            const fallbackTimeout = setTimeout(executeOutboundBounce, 1200);

            try {
                // 2. Parse Incoming Campaign URL Target Elements
                const urlParams = new URLSearchParams(window.location.search);
                const sourceGroup = urlParams.get('utm_source') || 'organic_direct';
                const campaignPost = urlParams.get('utm_medium') || 'unknown_post';
                const encodedDestination = urlParams.get('dest');
                
                if (encodedDestination) {
                    try {
                        finalDestination = decodeURIComponent(encodedDestination);
                    } catch (e) {
                        console.error("[KNOCK ROUTER ERROR]: Failed to decode target link.", e);
                    }
                }

                console.log("[KNOCK ROUTER]: Prepared Telemetry Payload.");
                
                // 3. Fire Metric Tracking via Native Browser Background Post-Boxes
                if (typeof mixpanel !== 'undefined' && mixpanel.set_config) {
                    
                    // Force Mixpanel to use non-blocking background transport mechanisms
                    mixpanel.set_config({ api_transport: 'sendBeacon' });
                    
                    mixpanel.track("Outbound Redirect Clicked", {
                        "Resolved Destination": finalDestination,
                        "WhatsApp Group": sourceGroup,
                        "Campaign Medium": campaignPost,
                        "Device User Agent": navigator.userAgent
                    }, function() {
                        console.log("[KNOCK ROUTER]: Mixpanel tracking accepted. Clearing timer.");
                        clearTimeout(fallbackTimeout); 
                        executeOutboundBounce();
                    });
                } else {
                    console.warn("[KNOCK ROUTER]: Mixpanel global library undefined. Moving to fallback routing.");
                }

            } catch (error) {
                // Catch errors so the student redirect script never stops functioning
                console.error("[KNOCK ROUTER EXCEPTION CAUGHT]:", error);
            }
        }

        // Fire instantly when structural visual DOM assets load
        window.addEventListener('DOMContentLoaded', processScalableRoute);
    </script>
