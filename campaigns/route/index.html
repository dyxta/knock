<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourcing Core — Knock Intelligence</title>
    <style>
        body {
            background-color: #000000;
            color: #5E17EB;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            border: 2px solid #111111;
            border-top: 2px solid #5E17EB;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 0.7s linear infinite;
            margin-bottom: 16px;
        }
        .status-text {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #444444;
            font-weight: 600;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="status-text">Verifying Academic Signal...</div>

    <script>
        (function () {
            var MIXPANEL_TOKEN = "149911c4782c80fa3448236494355475";
            var fallback = "https://knocktalent.co.za";

            // --- 1. Parse params ---
            var params     = new URLSearchParams(window.location.search);
            var dest       = params.get("dest");
            var utm_source = params.get("utm_source") || "organic_direct";
            var utm_medium = params.get("utm_medium") || "unknown_post";
            var target     = fallback;

            try { if (dest) target = decodeURIComponent(dest); } catch (e) {}

            // --- 2. Build Mixpanel HTTP API payload ---
            // Mixpanel expects: POST /track  body: data=<base64(JSON array)>
            var event = [{
                event: "Outbound Redirect Clicked",
                properties: {
                    token:                MIXPANEL_TOKEN,
                    distinct_id:          utm_source,
                    "Resolved Destination": target,
                    "WhatsApp Group":       utm_source,
                    "Campaign Medium":      utm_medium,
                    "Device User Agent":    navigator.userAgent,
                    "mp_lib":               "web-beacon"
                }
            }];

            var json    = JSON.stringify(event);
            var encoded = btoa(json);  // base64 — Mixpanel HTTP API requirement

            console.log("[KNOCK] Payload JSON:", json);
            console.log("[KNOCK] Encoded:", encoded);

            // --- 3. Fire via fetch keepalive (visible in DevTools, survives navigation) ---
            try {
                fetch("https://api.mixpanel.com/track", {
                    method:    "POST",
                    keepalive: true,
                    headers:   { "Content-Type": "application/x-www-form-urlencoded" },
                    body:      "data=" + encoded + "&verbose=1&ip=1"
                })
                .then(function (r) { return r.text(); })
                .then(function (t) { console.log("[KNOCK] Mixpanel response:", t); })
                .catch(function (e) { console.error("[KNOCK] Mixpanel fetch error:", e); });

                console.log("[KNOCK] fetch dispatched. Redirecting to:", target);
            } catch (e) {
                console.error("[KNOCK] fetch failed:", e);
            }

            // --- 4. Redirect (fetch keepalive outlives navigation) ---
            window.location.href = target;
        })();
    </script>
</body>
</html>
