<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourcing Core — Knock Intelligence</title>
    <style>
        body {
            background-color: #000000;
            color: #5E17EB;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            border: 2px solid #111111;
            border-top: 2px solid #5E17EB;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 0.7s linear infinite;
            margin-bottom: 16px;
        }
        .status-text {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #444444;
            font-weight: 600;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="status-text">Verifying Academic Signal...</div>

    <script>
        (function () {
            var POSTHOG_KEY      = "phc_xzm7oKEYjgwRCDbGZ6SE5aEaB3CQu6NufxRJXnjDrQi7";
            var POSTHOG_ENDPOINT = "https://eu.i.posthog.com/capture/";
            var fallback         = "https://knocktalent.co.za";

            // Parse params
            var params     = new URLSearchParams(window.location.search);
            var dest       = params.get("dest");
            var utm_source = params.get("utm_source") || "organic_direct";
            var utm_medium = params.get("utm_medium") || "unknown_post";
            var target     = fallback;

            try { if (dest) target = decodeURIComponent(dest); } catch (e) {}

            // Stable device identity — persists in localStorage across sessions
            var deviceId = localStorage.getItem("knock_device_id");
            if (!deviceId) {
                deviceId = crypto.randomUUID();
                localStorage.setItem("knock_device_id", deviceId);
            }

            // Build PostHog capture payload (plain JSON — no encoding needed)
            var payload = JSON.stringify({
                api_key:     POSTHOG_KEY,
                event:       "Outbound Redirect Clicked",
                distinct_id: deviceId,
                properties: {
                    "Resolved Destination": target,
                    utm_source:             utm_source,
                    utm_medium:             utm_medium,
                    "Device User Agent":    navigator.userAgent,
                    "$current_url":         window.location.href
                }
            });

            console.log("[KNOCK] Firing PostHog event:", payload);

            // Fire via fetch keepalive — completes in background after navigation
            fetch(POSTHOG_ENDPOINT, {
                method:    "POST",
                keepalive: true,
                headers:   { "Content-Type": "application/json" },
                body:      payload
            })
            .then(function (r) { return r.json(); })
            .then(function (j) { console.log("[KNOCK] PostHog response:", j); })
            .catch(function (e) { console.error("[KNOCK] PostHog error:", e); });

            // Redirect immediately — keepalive fetch outlives navigation
            console.log("[KNOCK] Redirecting to:", target);
            window.location.href = target;
        })();
    </script>
</body>
</html>
