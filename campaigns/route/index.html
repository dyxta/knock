<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourcing Core — Knock Intelligence</title>
    <style>
        body {
            background-color: #000000;
            color: #5E17EB;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            border: 2px solid #111111;
            border-top: 2px solid #5E17EB;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 0.7s linear infinite;
            margin-bottom: 16px;
        }
        .status-text {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #444444;
            font-weight: 600;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="status-text">Verifying Academic Signal...</div>

    <script>
        function processScalableRoute() {
            var isRedirected = false;
            var finalDestination = "https://knocktalent.co.za";

            function executeOutboundBounce() {
                if (!isRedirected) {
                    isRedirected = true;
                    console.log("[KNOCK ROUTER]: Redirecting to ->", finalDestination);
                    window.location.href = finalDestination;
                }
            }

            // 1.2s failsafe — fires if anything above stalls
            var fallbackTimeout = setTimeout(executeOutboundBounce, 1200);

            try {
                // Parse campaign parameters
                var urlParams = new URLSearchParams(window.location.search);
                var sourceGroup  = urlParams.get('utm_source')  || 'organic_direct';
                var campaignPost = urlParams.get('utm_medium')  || 'unknown_post';
                var encodedDest  = urlParams.get('dest');

                if (encodedDest) {
                    try {
                        finalDestination = decodeURIComponent(encodedDest);
                    } catch (e) {
                        console.error("[KNOCK ROUTER ERROR]: Failed to decode dest.", e);
                    }
                }

                // Fire tracking directly via navigator.sendBeacon → Mixpanel HTTP API.
                // This bypasses the JS SDK entirely, so there is no async library load
                // race condition — the beacon is queued by the browser before navigation.
                if (navigator.sendBeacon) {
                    try {
                        var payload = JSON.stringify([{
                            event: "Outbound Redirect Clicked",
                            properties: {
                                token: "149911c4782c80fa3448236494355475",
                                distinct_id: sourceGroup,
                                "Resolved Destination": finalDestination,
                                "WhatsApp Group": sourceGroup,
                                "Campaign Medium": campaignPost,
                                "Device User Agent": navigator.userAgent
                            }
                        }]);

                        var encoded = btoa(unescape(encodeURIComponent(payload)));
                        var body = new URLSearchParams({ data: encoded });

                        var sent = navigator.sendBeacon("https://api.mixpanel.com/track", body);
                        console.log("[KNOCK ROUTER]: sendBeacon dispatched ->", sent);
                    } catch (trackErr) {
                        console.error("[KNOCK ROUTER]: Beacon build failed.", trackErr);
                    }
                } else {
                    console.warn("[KNOCK ROUTER]: sendBeacon not supported, skipping tracking.");
                }

                // Redirect immediately — beacon survives page navigation
                clearTimeout(fallbackTimeout);
                executeOutboundBounce();

            } catch (error) {
                console.error("[KNOCK ROUTER EXCEPTION CAUGHT]:", error);
            }
        }

        window.addEventListener('DOMContentLoaded', processScalableRoute);
    </script>
</body>
</html>
