<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knock — Campaign Link Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f5f5;
      color: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #5E17EB;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #111;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }

    .field { margin-bottom: 20px; }

    input {
      width: 100%;
      background: #fafafa;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #5E17EB; background: #fff; }
    input::placeholder { color: #bbb; }

    button {
      width: 100%;
      background: #5E17EB;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Lock screen */
    #lock-screen { display: block; }
    #main-screen { display: none; }

    .lock-icon {
      font-size: 28px;
      margin-bottom: 16px;
    }

    .result {
      margin-top: 28px;
      display: none;
    }

    .result-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 10px;
    }

    .result-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f3eeff;
      border: 1px solid #d4b8ff;
      border-radius: 8px;
      padding: 12px 14px;
    }

    .result-url {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: #5E17EB;
      word-break: break-all;
    }

    .copy-btn {
      background: #fff;
      border: 1px solid #c9a5ff;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      color: #5E17EB;
      cursor: pointer;
      white-space: nowrap;
      width: auto;
      margin-top: 0;
      transition: background 0.15s;
    }

    .copy-btn:hover { background: #f3eeff; }
    .copy-btn.copied { color: #1a8f3c; border-color: #1a8f3c; background: #f0faf3; }

    .error {
      margin-top: 16px;
      padding: 12px 14px;
      background: #fff5f5;
      border: 1px solid #fcc;
      border-radius: 8px;
      font-size: 13px;
      color: #cc3333;
      display: none;
    }

    .recent {
      margin-top: 32px;
      border-top: 1px solid #eee;
      padding-top: 24px;
      display: none;
    }

    .recent-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 14px;
    }

    .recent-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      gap: 12px;
    }

    .recent-item:last-child { border-bottom: none; }

    .recent-meta { flex: 1; min-width: 0; }
    .recent-code { font-size: 13px; font-weight: 600; color: #5E17EB; }
    .recent-detail { font-size: 11px; color: #aaa; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .recent-copy {
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      color: #888;
      cursor: pointer;
      width: auto;
      margin-top: 0;
      white-space: nowrap;
    }

    .recent-copy:hover { border-color: #5E17EB; color: #5E17EB; }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">Knock Intelligence</div>

    <!-- Lock screen -->
    <div id="lock-screen">
      <div class="lock-icon">🔒</div>
      <h1>Team Access</h1>
      <p class="subtitle" style="margin-bottom:24px;">Enter the Knock team password to continue.</p>
      <div class="field">
        <label>Password</label>
        <input id="password-input" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')unlock()" />
      </div>
      <div class="error" id="lock-error"></div>
      <button onclick="unlock()">Continue</button>
    </div>

    <!-- Main screen -->
    <div id="main-screen">
      <h1>Campaign Link Generator</h1>
      <p class="subtitle">Fill in the three fields — your short link builds instantly.</p>

      <div class="field">
        <label>Opportunity URL</label>
        <input id="dest" type="url" placeholder="https://absa.co.za/grad-programme" />
      </div>

      <div class="field">
        <label>Group Name</label>
        <input id="source" type="text" placeholder="wits_commerce_2025" />
      </div>

      <div class="field">
        <label>Wave / Medium</label>
        <input id="medium" type="text" placeholder="wave1_core" />
      </div>

      <button id="generate-btn" onclick="generate()">Generate Link</button>

      <div class="error" id="gen-error"></div>

      <div class="result" id="result">
        <div class="result-label">Your campaign link</div>
        <div class="result-box">
          <span class="result-url" id="result-url"></span>
          <button class="copy-btn" id="copy-btn" onclick="copy()">Copy</button>
        </div>
      </div>

      <div class="recent" id="recent">
        <div class="recent-label">Recent links</div>
        <div id="recent-list"></div>
      </div>
    </div>
  </div>

  <script>
    var RECENT_KEY   = 'knock_recent_links';
    var SESSION_KEY  = 'knock_authed';
    var PASSWORD_KEY = 'knock_pw';

    // ── Auth ────────────────────────────────────────────────────────────────

    function unlock() {
      var pw = document.getElementById('password-input').value;
      var errEl = document.getElementById('lock-error');
      errEl.style.display = 'none';

      if (!pw) {
        errEl.textContent = 'Please enter the password.';
        errEl.style.display = 'block';
        return;
      }

      // Store the password in sessionStorage and send a test request to validate
      sessionStorage.setItem(SESSION_KEY, '1');
      sessionStorage.setItem(PASSWORD_KEY, pw);

      // Validate by hitting /api/create with a dry-run flag
      fetch('/api/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ _auth_check: true, password: pw })
      }).then(function (r) {
        if (r.status === 401) {
          sessionStorage.clear();
          errEl.textContent = 'Incorrect password.';
          errEl.style.display = 'block';
        } else {
          showMain();
        }
      }).catch(function () {
        // Network error — still let them through, API will reject bad password
        showMain();
      });
    }

    function showMain() {
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('main-screen').style.display = 'block';
      renderRecent();
    }

    // Auto-login if already authed this session
    if (sessionStorage.getItem(SESSION_KEY)) showMain();

    // ── Recent links ────────────────────────────────────────────────────────

    function getRecent() {
      try { return JSON.parse(localStorage.getItem(RECENT_KEY)) || []; }
      catch (e) { return []; }
    }

    function saveRecent(entry) {
      var list = getRecent();
      list.unshift(entry);
      if (list.length > 8) list = list.slice(0, 8);
      localStorage.setItem(RECENT_KEY, JSON.stringify(list));
    }

    function renderRecent() {
      var list = getRecent();
      var section = document.getElementById('recent');
      var container = document.getElementById('recent-list');
      if (!list.length) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      container.innerHTML = list.map(function (item) {
        return '<div class="recent-item">' +
          '<div class="recent-meta">' +
            '<div class="recent-code">' + item.shortUrl + '</div>' +
            '<div class="recent-detail">' + item.source + ' · ' + item.medium + '</div>' +
          '</div>' +
          '<button class="recent-copy" onclick="copyText(\'' + item.shortUrl + '\', this)">Copy</button>' +
        '</div>';
      }).join('');
    }

    function copyText(text, btn) {
      navigator.clipboard.writeText(text).then(function () {
        if (btn) { btn.textContent = 'Copied'; setTimeout(function () { btn.textContent = 'Copy'; }, 1800); }
      });
    }

    function copy() {
      var url = document.getElementById('result-url').textContent;
      var btn = document.getElementById('copy-btn');
      navigator.clipboard.writeText(url).then(function () {
        btn.textContent = 'Copied';
        btn.classList.add('copied');
        setTimeout(function () { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
      });
    }

    // ── Generate ─────────────────────────────────────────────────────────────

    async function generate() {
      var dest   = document.getElementById('dest').value.trim();
      var source = document.getElementById('source').value.trim();
      var medium = document.getElementById('medium').value.trim();
      var pw     = sessionStorage.getItem(PASSWORD_KEY) || '';

      var errorEl  = document.getElementById('gen-error');
      var resultEl = document.getElementById('result');
      var btn      = document.getElementById('generate-btn');

      errorEl.style.display = 'none';
      resultEl.style.display = 'none';

      if (!dest || !source || !medium) {
        errorEl.textContent = 'All three fields are required.';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Generating…';

      try {
        var res = await fetch('/api/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dest: dest, source: source, medium: medium, password: pw })
        });

        if (res.status === 401) {
          sessionStorage.clear();
          document.getElementById('main-screen').style.display = 'none';
          document.getElementById('lock-screen').style.display = 'block';
          return;
        }

        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Something went wrong');

        document.getElementById('result-url').textContent = data.shortUrl;
        resultEl.style.display = 'block';

        saveRecent({ shortUrl: data.shortUrl, source: source, medium: medium });
        renderRecent();

        navigator.clipboard.writeText(data.shortUrl).catch(function () {});

      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate Link';
      }
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && document.getElementById('main-screen').style.display !== 'none') generate();
    });
  </script>

</body>
</html>
